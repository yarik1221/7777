<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Цветовая гамма HTML-документа</title>
</head>
<body>
    <h2>Справочная таблица «Цветовая гамма HTML‑документа»</h2>

    <table border="1" width="100%">
        <!-- Строка 1: оттенки красного -->
        <tr>
            <td style="background-color: #FF0000; color: white;">#FF0000 (Red)</td>
            <td style="background-color: #FF3333; color: white;">#FF3333</td>
            <td style="background-color: #CC0000; color: white;">#CC0000</td>
            <td style="background-color: #990000; color: white;">#990000</td>
            <td style="background-color: #660000; color: white;">#660000</td>
        </tr>

        <!-- Строка 2: оттенки зелёного -->
        <tr>
            <td style="background-color: #00FF00; color: black;">#00FF00 (Lime)</td>
            <td style="background-color: #33FF33; color: black;">#33FF33</td>
            <td style="background-color: #00CC00; color: black;">#00CC00</td>
            <td style="background-color: #009900; color: white;">#009900</td>
            <td style="background-color: #006600; color: white;">#006600</td>
        </tr>

        <!-- Строка 3: оттенки синего -->
        <tr>
            <td style="background-color: #0000FF; color: white;">#0000FF (Blue)</td>
            <td style="background-color: #3333FF; color: white;">#3333FF</td>
            <td style="background-color: #0000CC; color: white;">#0000CC</td>
            <td style="background-color: #000099; color: white;">#000099</td>
            <td style="background-color: #000066; color: white;">#000066</td>
        </tr>
    </table>
</body>
</html>

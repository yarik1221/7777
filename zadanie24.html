<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 4. Заполнение таблицы</title>
</head>
<body>
    <table border="1">
        <tr>
            <!-- В первую ячейку первой строки вставляем рисунок -->
            <td align="center" valign="middle">
                <img src="image.jpg" alt="Рисунок" style="max-width: 100%; height: auto;">
            </td>
            <td align="center" valign="middle">Два</td>
            <td align="center" valign="middle">Три</td>
        </tr>
        <tr>
            <!-- Во второй ячейке второй строки — любимое четверостишие -->
            <td><b>Четыре</b></td>
            <td>
                <b>Люблю грозу в начале мая,<br>
                Когда весенний, первый гром,<br>
                Как бы резвяся и играя,<br>
                Грохочет в небе голубом.</b>
            </td>
            <!-- Третья ячейка второй строки с красным фоном -->
            <td bgcolor="red"><b>Шесть</b></td>
        </tr>
    </table>
</body>
</html>

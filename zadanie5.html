<!DOCTYPE html>
<html>
<head>
    <title>Задание 1. Оформление цветом Web-страницы.</title>
</head>
<body bgcolor="black">
    
    <!-- Надпись белым цветом, размер шрифта 4, выравнивание по центру -->
    <p align="center">
        <font color="white" size="4">Спокойной ночи</font>
    </p>

    <!-- Горизонтальная линия красного цвета -->
    <hr color="red">

    <!-- Надпись жёлтым цветом, размер шрифта 7, выравнивание по центру -->
    <p align="center">
        <font color="yellow" size="7">Приятных сновидений</font>
    </p>

    <!-- Горизонтальная линия синего цвета: толщина 10px, длина 50%, выравнивание по центру -->
    <hr color="blue" size="10" width="50%" align="center">

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3. Использование линий</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0; /* Лёгкий фон, чтобы радуга была заметнее */
        }
        .rainbow-container {
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрируем по горизонтали */
            justify-content: center;
            min-height: 100vh; /* Чтобы контейнер занимал всю высоту экрана */
            gap: 2px; /* Небольшой отступ между линиями */
        }
        .line {
            width: 50%; /* Длина 50% от ширины экрана */
            height: 10px; /* Толщина 10 пикселов */
        }
    </style>
</head>
<body>

    <div class="rainbow-container">
        <div class="line" style="background-color: red;"></div>
        <div class="line" style="background-color: orange;"></div>
        <div class="line" style="background-color: yellow;"></div>
        <div class="line" style="background-color: green;"></div>
        <div class="line" style="background-color: blue;"></div>
        <div class="line" style="background-color: indigo;"></div>
        <div class="line" style="background-color: violet;"></div>
    </div>

</body>
</html>

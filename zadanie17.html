<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1. Размещение графики на Web-странице</title>
</head>
<body bgcolor="orange">

    <h1 align="center">Заголовок самого большого размера</h1>

    <!-- 
      Атрибут src указывает имя файла картинки. 
      Убедитесь, что файл my-image.jpg лежит в той же папке, что и этот HTML-файл.
      Атрибут alt содержит подпись (текст, который появится, если картинка не загрузится).
      Атрибут border="2" создает рамку толщиной 2 пикселя.
    -->
    <img src="my-image.jpg" alt="Это пример подписи к рисунку" border="2">

</body>
</html>

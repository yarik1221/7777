<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Задание 1. Создание таблицы по образцу</title>
    <style>
        table {
            width: 100%;
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            vertical-align: middle;
        }
        th, td {
            padding: 10px;
            border: 1px solid black;
        }
        th {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table>
        <caption>Пример таблицы</caption>
        <tr>
            <th>Один</th>
            <th>Два</th>
            <th>Три</th>
        </tr>
        <tr>
            <td>Четыре</td>
            <td>Пять</td>
            <td>Шесть</td>
        </tr>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Цветовая гамма HTML-документа: Радуга</title>
</head>
<body>
    <h2>Справочная таблица «Цветовая гамма HTML‑документа»</h2>

    <table border="1" width="100%">
        <!-- Красный -->
        <tr>
            <td style="background-color: #FF0000; color: white;">#FF0000 (Red)</td>
        </tr>
        <!-- Оранжевый -->
        <tr>
            <td style="background-color: #FFA500; color: black;">#FFA500 (Orange)</td>
        </tr>
        <!-- Жёлтый -->
        <tr>
            <td style="background-color: #FFFF00; color: black;">#FFFF00 (Yellow)</td>
        </tr>
        <!-- Зелёный -->
        <tr>
            <td style="background-color: #008000; color: white;">#008000 (Green)</td>
        </tr>
        <!-- Голубой / Синий -->
        <tr>
            <td style="background-color: #0000FF; color: white;">#0000FF (Blue)</td>
        </tr>
        <!-- Индиго -->
        <tr>
            <td style="background-color: #4B0082; color: white;">#4B0082 (Indigo)</td>
        </tr>
        <!-- Фиолетовый -->
        <tr>
            <td style="background-color: #EE82EE; color: black;">#EE82EE (Violet)</td>
        </tr>
    </table>
</body>
</html>
